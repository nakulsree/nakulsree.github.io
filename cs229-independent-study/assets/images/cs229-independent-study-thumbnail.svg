<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Stanford CS229 Independent Study thumbnail — 10 algorithms from mathematical first principles">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0d0b"/>
      <stop offset="100%" style="stop-color:#13120f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Ruling lines (like notebook paper) -->
  <line x1="50" y1="0" x2="50" y2="450" stroke="rgba(196,147,63,0.1)" stroke-width="1"/>
  <line x1="0" y1="70" x2="800" y2="70" stroke="rgba(196,147,63,0.06)" stroke-width="1"/>
  <line x1="0" y1="115" x2="800" y2="115" stroke="rgba(196,147,63,0.04)" stroke-width="1"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="rgba(196,147,63,0.04)" stroke-width="1"/>
  <line x1="0" y1="205" x2="800" y2="205" stroke="rgba(196,147,63,0.04)" stroke-width="1"/>
  <line x1="0" y1="250" x2="800" y2="250" stroke="rgba(196,147,63,0.04)" stroke-width="1"/>
  <line x1="0" y1="295" x2="800" y2="295" stroke="rgba(196,147,63,0.04)" stroke-width="1"/>
  <line x1="0" y1="340" x2="800" y2="340" stroke="rgba(196,147,63,0.04)" stroke-width="1"/>
  <line x1="0" y1="385" x2="800" y2="385" stroke="rgba(196,147,63,0.04)" stroke-width="1"/>
  <line x1="0" y1="430" x2="800" y2="430" stroke="rgba(196,147,63,0.04)" stroke-width="1"/>

  <!-- Header rule -->
  <line x1="70" y1="55" x2="750" y2="55" stroke="rgba(196,147,63,0.25)" stroke-width="1"/>

  <!-- Label -->
  <text x="70" y="42" font-family="'Courier New',monospace" font-size="9" fill="#c4933f" letter-spacing="3" text-transform="uppercase">INDEPENDENT STUDY · STANFORD CS229 · MACHINE LEARNING</text>

  <!-- Title -->
  <text x="70" y="96" font-family="Georgia,serif" font-style="italic" font-weight="700" font-size="32" fill="#e8e0d0" letter-spacing="-0.5">Machine Learning</text>
  <text x="70" y="130" font-family="Georgia,serif" font-style="italic" font-size="18" fill="#9a8e78">Algorithms from Mathematical First Principles</text>

  <!-- Decorative Roman numeral -->
  <text x="750" y="105" font-family="Georgia,serif" font-style="italic" font-size="48" fill="rgba(196,147,63,0.12)" text-anchor="end">I–X</text>

  <!-- 10 topics list -->
  <g font-family="'Courier New',monospace" font-size="10.5">
    <!-- Column 1 -->
    <text x="70" y="168" fill="#c4933f">01</text>
    <text x="100" y="168" fill="#9a8e78">Logistic Regression via Newton's Method</text>
    <text x="70" y="190" fill="#c4933f">02</text>
    <text x="100" y="190" fill="#9a8e78">Gaussian Discriminant Analysis (GDA)</text>
    <text x="70" y="212" fill="#c4933f">03</text>
    <text x="100" y="212" fill="#9a8e78">Positive-Unlabeled Learning + Correction</text>
    <text x="70" y="234" fill="#c4933f">04</text>
    <text x="100" y="234" fill="#9a8e78">Poisson Regression — Generalized Linear Models</text>
    <text x="70" y="256" fill="#c4933f">05</text>
    <text x="100" y="256" fill="#9a8e78">EM Algorithm for Gaussian Mixture Models</text>
    <text x="70" y="278" fill="#c4933f">06</text>
    <text x="100" y="278" fill="#9a8e78">Locally Weighted Regression</text>
    <text x="70" y="300" fill="#c4933f">07</text>
    <text x="100" y="300" fill="#9a8e78">Kernel Perceptron (Dual Form)</text>
    <text x="70" y="322" fill="#c4933f">08</text>
    <text x="100" y="322" fill="#9a8e78">Independent Component Analysis (ICA)</text>
    <text x="70" y="344" fill="#c4933f">09</text>
    <text x="100" y="344" fill="#9a8e78">Naïve Bayes Spam Classifier + SVM</text>
    <text x="70" y="366" fill="#c4933f">10</text>
    <text x="100" y="366" fill="#9a8e78">Reinforcement Learning — CartPole (Value Iteration)</text>
  </g>

  <!-- Key equations panel (right side) -->
  <rect x="490" y="155" width="290" height="220" rx="4" fill="#1a1814" stroke="rgba(196,147,63,0.15)" stroke-width="1"/>
  <line x1="490" y1="175" x2="780" y2="175" stroke="rgba(196,147,63,0.15)" stroke-width="1"/>
  <text x="505" y="168" font-family="'Courier New',monospace" font-size="8" fill="#c4933f" letter-spacing="2">KEY EQUATIONS</text>

  <g font-family="'Courier New',monospace" font-size="9.5" fill="#d4a85a">
    <!-- Newton's method -->
    <text x="505" y="193" fill="#5a5040">Newton:</text>
    <text x="505" y="208">θ := θ − H⁻¹ ∇θ ℓ(θ)</text>

    <!-- ICA -->
    <text x="505" y="228" fill="#5a5040">ICA:</text>
    <text x="505" y="243">W := W + α((Wᵀ)⁻¹ − sign(Wx)xᵀ)</text>

    <!-- EM E-step -->
    <text x="505" y="263" fill="#5a5040">EM (E-step):</text>
    <text x="505" y="278">wⱼ = φⱼN(x;μⱼ,Σⱼ) / Σφₖ N(x;μₖ,Σₖ)</text>

    <!-- Value Iteration -->
    <text x="505" y="298" fill="#5a5040">Bellman:</text>
    <text x="505" y="313">V(s) = R(s) + γ maxₐ Σ P(s'|s,a)V(s')</text>

    <!-- Poisson GLM -->
    <text x="505" y="333" fill="#5a5040">Poisson GLM:</text>
    <text x="505" y="348">∂ℓ/∂θⱼ = Σᵢ(yᵢ − exp(θᵀxᵢ))xᵢⱼ</text>
  </g>

  <!-- Stats row -->
  <line x1="70" y1="395" x2="460" y2="395" stroke="rgba(196,147,63,0.15)" stroke-width="1"/>
  <g font-family="Georgia,serif" font-size="11">
    <text x="70" y="416" fill="#c4933f" font-weight="700">10</text>
    <text x="90" y="416" fill="#5a5040" font-family="'Courier New',monospace" font-size="9">algorithms</text>
    <text x="170" y="416" fill="#c4933f" font-weight="700">6</text>
    <text x="185" y="416" fill="#5a5040" font-family="'Courier New',monospace" font-size="9">problem sets</text>
    <text x="275" y="416" fill="#c4933f" font-weight="700">97.8%</text>
    <text x="320" y="416" fill="#5a5040" font-family="'Courier New',monospace" font-size="9">NB accuracy</text>
  </g>

  <text x="760" y="440" font-family="'Courier New',monospace" font-size="9" fill="#3a3428" text-anchor="end">Nakul Sreekanth · Independent Study · 2023–2024</text>
</svg>
