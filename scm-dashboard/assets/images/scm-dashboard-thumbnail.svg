  <circle cx="756" cy="121" r="3" fill="#e74c3c"/>
  <circle cx="745" cy="121" r="3" fill="#f9ca24"/>
  <circle cx="734" cy="121" r="3" fill="#2ecc71"/>

  <text x="534" y="155" font-family="monospace" font-size="8" fill="#74b9ff">SELECT</text>
  <text x="572" y="155" font-family="monospace" font-size="8" fill="#ddeedd"> l.ContinentName,</text>
  <text x="534" y="168" font-family="monospace" font-size="8" fill="#ddeedd">  COUNT(</text>
  <text x="570" y="168" font-family="monospace" font-size="8" fill="#74b9ff">DISTINCT</text>
  <text x="622" y="168" font-family="monospace" font-size="8" fill="#ddeedd"> de.EventID)</text>
  <text x="534" y="181" font-family="monospace" font-size="8" fill="#74b9ff">    + 2 * </text>
  <text x="574" y="181" font-family="monospace" font-size="8" fill="#74b9ff">COUNT</text>
  <text x="600" y="181" font-family="monospace" font-size="8" fill="#ddeedd">(</text>
  <text x="534" y="194" font-family="monospace" font-size="8" fill="#74b9ff">    CASE WHEN</text>
  <text x="600" y="194" font-family="monospace" font-size="8" fill="#ddeedd"> ImpactLevel</text>
  <text x="534" y="207" font-family="monospace" font-size="8" fill="#ddeedd">    = </text>
  <text x="554" y="207" font-family="monospace" font-size="8" fill="#a8e063">'High'</text>
  <text x="590" y="207" font-family="monospace" font-size="8" fill="#74b9ff"> THEN</text>
  <text x="620" y="207" font-family="monospace" font-size="8" fill="#ddeedd"> EventID</text>
  <text x="534" y="220" font-family="monospace" font-size="8" fill="#74b9ff">    ELSE NULL END</text>
  <text x="534" y="233" font-family="monospace" font-size="8" fill="#ddeedd">) </text>
  <text x="546" y="233" font-family="monospace" font-size="8" fill="#74b9ff">AS</text>
  <text x="562" y="233" font-family="monospace" font-size="8" fill="#ddeedd"> ExposureScore</text>

  <line x1="534" y1="245" x2="756" y2="245" stroke="#1a2f1f" stroke-width="1"/>

  <text x="534" y="260" font-family="monospace" font-size="8" fill="#74b9ff">SELECT</text>
  <text x="572" y="260" font-family="monospace" font-size="8" fill="#ddeedd"> CompanyID,</text>
  <text x="534" y="273" font-family="monospace" font-size="8" fill="#ddeedd">  DownstreamCount</text>
  <text x="534" y="286" font-family="monospace" font-size="8" fill="#74b9ff">  * </text>
  <text x="548" y="286" font-family="monospace" font-size="8" fill="#ddeedd">HighImpactCount</text>
  <text x="534" y="299" font-family="monospace" font-size="8" fill="#74b9ff">  AS</text>
  <text x="556" y="299" font-family="monospace" font-size="8" fill="#2ecc71" filter="url(#glow)"> Criticality</text>
  <text x="534" y="312" font-family="monospace" font-size="8" fill="#74b9ff">FROM</text>
  <text x="558" y="312" font-family="monospace" font-size="8" fill="#ddeedd"> Company c</text>
