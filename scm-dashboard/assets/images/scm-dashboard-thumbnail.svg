  <text x="588" y="325" font-family="monospace" font-size="8" fill="#ddeedd"> (subquery_ds)</text>
  <text x="534" y="338" font-family="monospace" font-size="8" fill="#74b9ff">LEFT JOIN</text>
  <text x="588" y="338" font-family="monospace" font-size="8" fill="#ddeedd"> (subquery_hi)</text>
  <text x="534" y="351" font-family="monospace" font-size="8" fill="#74b9ff">ORDER BY</text>
  <text x="586" y="351" font-family="monospace" font-size="8" fill="#2ecc71"> Criticality DESC</text>
  <text x="534" y="364" font-family="monospace" font-size="8" fill="#74b9ff">LIMIT</text>
  <text x="562" y="364" font-family="monospace" font-size="8" fill="#a8e063"> 20</text>

  <!-- Footer -->
